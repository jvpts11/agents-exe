[ldp3_project]

[program]
name = "AgentsExe"
version = "0.1.0"
language_version = "1.0"
entry = "src/main.ldp3"

[dependencies]
ldp3-opengl = { path = "../ldp3-opengl" }

[build]
output = "build-output/"
target = "x86_64-windows"
freestanding = false
subsystem = "windows"
native_libs = "opengl32, gdi32, user32, kernel32, gdiplus"
